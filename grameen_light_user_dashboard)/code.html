<style>

            0% { box-shadow: 0 0 0 0 rgba(186, 26, 26, 0.7); }

<script>
        // Simple Micro-interaction for bottom sheet
        let isSheetOpen = true;
        const sheet = document.getElementById('pole-details');
        
        // Example toggle logic if needed in future
        function toggleSheet() {
            if (isSheetOpen) {
                sheet.style.transform = 'translateY(100px)'; // Peek state
            } else {
                sheet.style.transform = 'translateY(0)';
            }
            isSheetOpen = !isSheetOpen;
        }

        // Mock interaction for pole clicking
        document.querySelectorAll('.marker-pulse').forEach(marker => {
            marker.addEventListener('click', () => {
                sheet.style.transform = 'translateY(0)';
                isSheetOpen = true;
            });
        });
    </script>
