<body class="flex flex-col min-h-screen">
<!-- Login screen is Transactional/Focused: Nav Shells are suppressed per mandate -->
<main class="flex-grow flex flex-col items-center justify-start pt-12 px-margin-mobile md:px-margin-desktop max-w-md mx-auto w-full">
<!-- Illustration Section -->
<div class="w-full mb-10 overflow-hidden rounded-[24px] bg-surface-container-low aspect-[4/3] flex items-center justify-center relative shadow-sm">
<img alt="Village Technology Illustration" class="object-cover w-full h-full" data-alt="A warm, friendly vector-style illustration of a modern Indian village at sunset. Glowing smart streetlights line a clean paved path where people are walking. The art style is flat with soft gradients, using a palette of primary green, earthy tones, and a bright yellow sky. In the background, modern solar panels and traditional village homes blend seamlessly, conveying a sense of technological progress and community trust." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDFrPPko7qPNyS2_D0BYDhXkhMZslEYiq9IynE8JaMFhqcVCfPIrs3vRM0BJNp70M0Bu3QnVcEF7G-EENCHB1oAbClu3b0_7hKVJdxb7bcSE28LRfKOzLO2Ivu53QWVyLQneJjWhwoLqwoW4bS9NWnD1bj_oo-YpEVsOrHPrS_ugFXprHN5V6yDSYQvDDyTD2whLP_UfjDjdMa24OMBserlLOKwvl198k3fBOLbNb7Bb_9KHEsHtpHLyWBCcxfY2OkoNLaQLLVTYxE"/>
</div>
<!-- Branding & Header -->
<div class="text-center w-full mb-10">
<div class="flex items-center justify-center gap-2 mb-4">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="lightbulb">lightbulb</span>
<h1 class="font-display-lg text-headline-lg-mobile md:text-headline-lg font-bold text-primary tracking-tight">Grameen-Light</h1>
</div>
<p class="font-title-lg text-title-lg text-on-surface mb-2">Login to Grameen-Light</p>
<p class="font-body-md text-body-md text-on-surface-variant">Access your digital village services and streetlight controls</p>
</div>
<!-- Login Form -->
<div class="w-full space-y-6">
<!-- Phone Number Input -->
<div class="relative group">
<label class="block mb-2 font-label-lg text-label-lg text-on-surface-variant px-1">Mobile Number</label>
<div class="flex items-center border-2 border-outline-variant rounded-xl overflow-hidden focus-within:border-primary transition-colors bg-white">
<div class="px-4 py-4 bg-surface-container-high border-r border-outline-variant flex items-center gap-1">
<span class="font-label-lg text-label-lg text-on-surface-variant">+91</span>
<span class="material-symbols-outlined text-sm text-on-surface-variant" data-icon="arrow_drop_down">arrow_drop_down</span>
</div>
<input class="w-full px-4 py-4 bg-transparent border-none focus:ring-0 font-body-lg text-body-lg text-on-surface placeholder:text-outline-variant" maxlength="10" placeholder="Enter 10 digit number" type="tel"/>
<div class="pr-4">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="phone_iphone">phone_iphone</span>
</div>
</div>
</div>
<!-- Action Buttons Stack -->
<div class="space-y-4 pt-4">
<!-- Send OTP Button (Primary Action) -->
<button class="w-full py-4 bg-primary text-on-primary rounded-full font-label-lg text-label-lg font-bold shadow-md hover:bg-primary-container active:scale-95 transition-all flex items-center justify-center gap-2">
<span>Send OTP</span>
<span class="material-symbols-outlined" data-icon="send">send</span>
</button>
<!-- Continue (Disabled-looking or Secondary) -->
<button class="w-full py-4 bg-surface-container-highest text-on-surface-variant rounded-full font-label-lg text-label-lg font-medium active:scale-95 transition-all opacity-70">
                    Continue
                </button>
</div>
<!-- Bottom Context -->
<div class="pt-8 text-center">
<p class="font-label-md text-label-md text-on-surface-variant">
                    By logging in, you agree to our 
                    <a class="text-primary font-bold hover:underline" href="#">Terms of Service</a> 
                    and 
                    <a class="text-primary font-bold hover:underline" href="#">Privacy Policy</a>
</p>
</div>
</div>
